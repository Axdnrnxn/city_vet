<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>City Vet - Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gradient-to-br from-[#004D40] to-[#00796B] min-h-screen flex items-center justify-center py-12 px-4 md:px-8 relative">

    <div class="fixed inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#ffffff 2px, transparent 2px); background-size: 30px 30px;"></div>

    <div class="w-full max-w-5xl flex flex-col md:flex-row items-center justify-center gap-8 md:gap-12 relative z-10">
        
        <div class="hidden md:flex flex-1 justify-center items-center">
            <div class="bg-white/5 backdrop-blur-sm rounded-full h-80 w-80 flex flex-col items-center justify-center shadow-2xl border-4 border-white/20 text-center p-6">
                <i class="fa-solid fa-house-medical text-white/80 text-6xl mb-4"></i>
                <h2 class="text-white text-2xl font-bold tracking-widest uppercase">City Vet</h2>
                <p class="text-teal-100/70 text-sm tracking-widest uppercase mt-1">Cagayan de Oro</p>
            </div>
        </div>

        <div class="flex-1 w-full max-w-md">
            
            <div class="bg-white/10 backdrop-blur-lg p-6 md:p-8 rounded-2xl md:rounded-3xl shadow-2xl border border-white/20">
                
                <h2 class="text-white text-xl md:text-2xl font-bold mb-6 tracking-wider text-center">CREATE ACCOUNT</h2>
                
                <form id="registerForm" class="space-y-4">
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div>
                            <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">First Name</label>
                            <input type="text" id="fname" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                        </div>
                        <div>
                            <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Last Name</label>
                            <input type="text" id="lname" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Address / Street</label>
                        <input type="text" id="address" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                    </div>
                    
                    <div>
                        <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Barangay</label>
                        <select id="barangay" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition font-medium appearance-none">
                            <option value="" disabled selected class="text-gray-800">Select Barangay</option>
                            <option value="Carmen" class="text-gray-800">Carmen</option>
                            <option value="Kauswagan" class="text-gray-800">Kauswagan</option>
                            <option value="Nazareth" class="text-gray-800">Nazareth</option>
                            <option value="Poblacion" class="text-gray-800">Poblacion</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Email Address</label>
                        <input type="email" id="email" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                    </div>
                    
                    <div>
                        <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Contact No.</label>
                        <input type="tel" id="phone" placeholder="09*********" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white placeholder-teal-100/50 focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                    </div>

                    <div class="pt-3 border-t border-white/20 space-y-3 mt-2">
                        <div>
                            <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Create Password</label>
                            <input type="password" id="pass" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                        </div>
                        
                        <div>
                            <label class="text-teal-50 text-[10px] font-bold uppercase ml-1 tracking-wider">Confirm Password</label>
                            <input type="password" id="confirm_pass" required class="w-full p-2.5 rounded-lg bg-white/20 border border-white/10 text-white focus:ring-2 focus:ring-teal-300 focus:bg-white/30 outline-none transition">
                        </div>
                    </div>

                    <div class="flex items-center ml-1 pt-1">
                        <input type="checkbox" id="showPass" onclick="togglePassword()" class="w-4 h-4 text-teal-600 rounded bg-white/20 border-white/30 cursor-pointer focus:ring-0">
                        <label for="showPass" class="ml-2 text-teal-50 text-sm cursor-pointer select-none">Show Password</label>
                    </div>

                    <button type="submit" class="w-full bg-white text-[#00796B] font-extrabold py-3.5 rounded-lg shadow-lg hover:bg-gray-100 transition duration-200 uppercase text-sm tracking-wider mt-4">
                        Register Account
                    </button>

                    <div class="text-center mt-6">
                        <p class="text-teal-100/80 text-xs">
                            ALREADY HAVE AN ACCOUNT? <br>
                            <a href="login.html" class="text-white font-bold hover:text-teal-200 hover:underline mt-1 inline-block uppercase transition">Log In Here</a>
                        </p>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            var p = document.getElementById("pass");
            var cp = document.getElementById("confirm_pass");
            if (p.type === "password") { p.type = "text"; cp.type = "text"; } else { p.type = "password"; cp.type = "password"; }
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                lname: document.getElementById('lname').value,
                fname: document.getElementById('fname').value,
                address: document.getElementById('address').value,
                barangay: document.getElementById('barangay').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('pass').value,
                confirm_password: document.getElementById('confirm_pass').value
            };

             try {
                const res = await fetch('api/auth/register.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const result = await res.json();

                if(result.status === 'success') {
                    Swal.fire({icon: 'success', title: 'Success', text: result.message}).then(() => window.location.href = 'login.html');
                } else {
                    Swal.fire({icon: 'error', title: 'Error', text: result.message});
                }
            } catch (err) {
                Swal.fire({icon: 'error', title: 'System Error', text: 'Connection failed.'});
            }
        });
    </script>
</body>
</html>
