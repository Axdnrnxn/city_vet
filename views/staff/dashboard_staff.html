<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - City Vet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        fetch('../../api/auth/session_check.php')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    window.location.replace('../../login.html');
                } else {
                    const updateHeaderName = () => {
                        const nameDisplay = document.getElementById('staff-name-display');
                        if (nameDisplay && data.user && data.user.name) {
                            let displayName = data.user.name.split('@')[0];
                            displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
                            nameDisplay.innerText = displayName;
                        }
                    };
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', updateHeaderName);
                    } else {
                        updateHeaderName();
                    }
                }
            })
            .catch(() => { window.location.replace('../../login.html'); });
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"></div>

    <div id="sidebar-container"></div>
    <script src="../../js/sidebar_staff.js"></script>

    <div class="flex-1 flex flex-col h-screen relative">
        <header class="bg-white h-16 flex items-center justify-between px-4 lg:px-8 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-[#00796B] text-xl focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-800">Receptionist Desk</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Clinic Staff</p>
                        <p id="staff-name-display" class="text-sm font-medium text-gray-700">Loading...</p>
                    </div>
                    <div class="w-10 h-10 bg-[#00796B] text-white rounded-full flex items-center justify-center font-bold">ST</div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">
            <div class="bg-gradient-to-br from-[#00796B] to-[#004D40] rounded-3xl p-8 text-white shadow-xl mb-8 flex flex-col md:flex-row items-center justify-between gap-6 border-b-4 border-orange-400">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Shift Overview ☕</h2>
                    <p class="text-teal-100 opacity-90 max-w-md">Manage client check-ins, register walk-in patients, and oversee the daily queue in real-time.</p>
                </div>
                <button onclick="window.location.href='walkin_management.html'" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg transition flex items-center gap-2">
                    <i class="fa-solid fa-person-walking-arrow-right text-xl"></i>
                    Register Walk-In
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-12 h-12 bg-teal-50 text-[#00796B] rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-calendar-check"></i>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase">Today's Queue</p>
                        <h3 id="todayCount" class="text-2xl font-bold text-gray-800">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-paw"></i>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase">Total Pets</p>
                        <h3 id="totalRecords" class="text-2xl font-bold text-gray-800">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-user-doctor"></i>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase">Active Staff</p>
                        <h3 id="staff_active" class="text-2xl font-bold text-gray-800">0</h3>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                    <h3 class="font-bold text-gray-800 text-lg">Live Patient Queue</h3>
                    <div class="relative w-full md:w-72">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-300 text-sm"></i>
                        <input type="text" id="queueSearch" onkeyup="filterQueue()" placeholder="Search patient or owner..." class="pl-10 w-full bg-gray-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#00796B]">
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                            <tr>
                                <th class="px-8 py-4">Time</th>
                                <th class="px-8 py-4">Patient & Owner</th>
                                <th class="px-8 py-4">Service</th>
                                <th class="px-8 py-4">Status</th>
                                <th class="px-8 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="queue-list" class="divide-y divide-gray-50 text-sm text-gray-700">
                            <tr><td colspan="5" class="py-20 text-center text-gray-400">Loading current queue...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        let autoRefreshInterval;

        // --- 1. Real-Time Data Fetching ---
        async function fetchDashboard() {
            try {
                // Fetching from the Staff-specific Global API
                const res = await fetch('../../api/dashboard/staff_stats.php');
                const data = await res.json();
                
                if(data.status === 'error') return;

                // Update Stats Cards
                document.getElementById('todayCount').innerText = data.stats.today_appointments || 0;
                document.getElementById('totalRecords').innerText = data.stats.total_patients || 0;
                document.getElementById('staff_active').innerText = data.stats.staff_active || 0;

                // Update Queue Table
                const list = document.getElementById('queue-list');
                if (!data.schedule || data.schedule.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" class="py-20 text-center text-gray-400 font-medium">No appointments today.</td></tr>';
                    return;
                }

                list.innerHTML = data.schedule.map((row, index) => `
                    <tr class="hover:bg-gray-50/50 transition-colors animate-fade-in" style="animation-delay: ${index * 0.05}s">
                        <td class="px-8 py-5 text-gray-400 font-medium">${row.Time}</td>
                        <td class="px-8 py-5">
                            <div class="font-bold text-gray-800">${row.Pet}</div>
                            <div class="text-[10px] text-teal-600 font-bold uppercase tracking-tighter">
                                ${row.Species || 'Patient'} • ${row.Owner_F} ${row.Owner_L}
                            </div>
                        </td>
                        <td class="px-8 py-5 text-gray-600 font-medium">${row.Service_Name}</td>
                        <td class="px-8 py-5">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${
                                row.Status === 'Confirmed' ? 'bg-green-50 text-green-600' : 'bg-orange-50 text-orange-600'
                            }">
                                ${row.Status}
                            </span>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <button class="w-8 h-8 text-gray-300 hover:text-[#00796B] transition"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Real-time sync error", e); }
        }

        // --- 2. Sync Controller ---
        function startRealTimeSync() {
            fetchDashboard(); // Run once immediately
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(fetchDashboard, 10000); // 10s intervals
        }

        // --- 3. UI Helpers ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if(sidebar) sidebar.classList.toggle('-translate-x-full');
            document.getElementById('mobileOverlay').classList.toggle('hidden');
        }

        function filterQueue() {
            const input = document.getElementById("queueSearch").value.toUpperCase();
            const rows = document.getElementById("queue-list").getElementsByTagName("tr");
            for (let row of rows) {
                row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }

        // --- 4. Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            startRealTimeSync();
        });

        // Pause syncing if tab is inactive to save server load
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                clearInterval(autoRefreshInterval);
            } else {
                startRealTimeSync();
            }
        });
    </script>
</body>
</html>
