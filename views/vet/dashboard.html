<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vet Dashboard - City Vet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        // Check session IMMEDIATELY before page loads
        fetch('../../api/auth/session_check.php')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    window.location.replace('../../login.html');
                } else {
                    // Safe UI Updater function
                    const updateHeaderName = () => {
                        const nameDisplay = document.getElementById('vet-name-display');
                        if (nameDisplay && data.user && data.user.name) {
                            // Automatically add "Dr." and remove the @gmail.com part if it's an email
                            let displayName = data.user.name.split('@')[0];
                            // Capitalize first letter
                            displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
                            nameDisplay.innerText = "Dr. " + displayName;
                        }
                    };

                    // Check if DOM is already loaded to prevent the race condition
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', updateHeaderName);
                    } else {
                        updateHeaderName();
                    }
                }
            })
            .catch(() => {
                window.location.replace('../../login.html');
            });
    </script>

    <script>
        // Check session IMMEDIATELY before page loads
        fetch('../../api/auth/session_check.php')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    // If the PHP bouncer says "Access Denied", kick them to login
                    window.location.replace('../../login.html');
                } else {
                    // Optional: If they are allowed, you can set the header name here!
                    document.addEventListener('DOMContentLoaded', () => {
                        const nameDisplay = document.getElementById('vet-name-display');
                        if (nameDisplay && data.user && data.user.name) {
                            nameDisplay.innerText = data.user.name;
                        }
                    });
                }
            })
            .catch(() => {
                // If the fetch fails entirely (e.g. server error), kick to login
                window.location.replace('../../login.html');
            });
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden backdrop-blur-sm"></div>

    <div id="sidebar-container"></div>
    <script src="../../js/sidebar_vet.js"></script>

    <div class="flex-1 flex flex-col h-screen relative">
        <header class="bg-white h-16 flex items-center justify-between px-4 lg:px-8 shadow-sm z-10 border-b border-gray-100">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-[#00796B] text-xl focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-800">Pending Requests</h2>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">
                    <i class="fa-solid fa-user-md"></i>
                </div>
                <span id="vet-name-display" class="hidden md:block text-sm font-medium text-gray-700">Dr. Veterinarian</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="px-6 py-4 text-xs font-bold uppercase text-gray-500">Appt ID</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-gray-500">Owner</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-gray-500">Pet</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-gray-500">Date</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase text-gray-500 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="appointment-table-body" class="divide-y divide-gray-50 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="detailsModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg transform transition-all overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
                <h3 class="text-lg font-bold"><i class="fa-solid fa-file-medical mr-2"></i> Appointment Details</h3>
                <button onclick="closeDetailsModal()" class="text-white hover:text-gray-200 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Owner Name</p>
                        <p id="det-owner" class="text-sm font-semibold text-gray-800">--</p>
                    </div>
                    <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Pet Name</p>
                        <p id="det-pet" class="text-sm font-semibold text-gray-800">--</p>
                    </div>
                    <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Species/Breed</p>
                        <p id="det-breed" class="text-sm font-semibold text-gray-800">--</p>
                    </div>
                    <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">Appt Date</p>
                        <p id="det-date" class="text-sm font-semibold text-gray-800">--</p>
                    </div>
                </div>
                
                <div class="pt-4 flex justify-end gap-3 border-t">
                    <button onclick="closeDetailsModal()" class="px-5 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg transition">Close</button>
                    <button id="approveBtn" class="px-5 py-2 bg-green-600 font-bold text-white rounded-lg hover:bg-green-700 shadow-md transition">Approve Appointment</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAppointments = [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        document.addEventListener('DOMContentLoaded', loadAppointments);

        function loadAppointments() {
            fetch('../../api/clinic/vet_get_pending.php')
                .then(res => res.json())
                .then(data => {
                    currentAppointments = data;
                    const tbody = document.getElementById('appointment-table-body');
                    tbody.innerHTML = ''; 

                    if (data.length === 0) {
                        tbody.innerHTML = "<tr><td colspan='5' class='px-6 py-10 text-center text-gray-400 font-medium'>No pending requests.</td></tr>";
                        return;
                    }

                    data.forEach(appt => {
                        const row = `
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 font-bold text-blue-600">#${appt.Appointment_ID}</td>
                                <td class="px-6 py-4 font-medium">${appt.Owner_First || 'User'} ${appt.Owner_Last || ''}</td>
                                <td class="px-6 py-4">${appt.Pet_Name || 'Pet'}</td>
                                <td class="px-6 py-4 font-medium">${appt.Appointment_Date}</td>
                                <td class="px-6 py-4 flex justify-center gap-2">
                                    <button onclick="viewDetails(${appt.Appointment_ID})" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-2 rounded-lg text-xs font-bold transition">
                                        <i class="fa-solid fa-eye"></i> Details
                                    </button>
                                    <button onclick="approveAppt(${appt.Appointment_ID})" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-lg text-xs font-bold transition shadow-sm">
                                        Approve
                                    </button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                });
        }

        function viewDetails(id) {
            const appt = currentAppointments.find(a => a.Appointment_ID == id);
            if (!appt) return;

            document.getElementById('det-owner').innerText = `${appt.Owner_First || 'Unknown'} ${appt.Owner_Last || ''}`;
            document.getElementById('det-pet').innerText = appt.Pet_Name || 'Not Specified';
            const species = appt.Species_Name || 'Unknown';
            const breed = appt.Breed_Name || 'Unknown';
            document.getElementById('det-breed').innerText = `${species} / ${breed}`;
            document.getElementById('det-date').innerText = appt.Appointment_Date;

            document.getElementById('approveBtn').onclick = () => approveAppt(id);
            document.getElementById('detailsModal').classList.remove('hidden');
        }

        // --- THE MISSING FUNCTION ---
        function closeDetailsModal() {
            document.getElementById('detailsModal').classList.add('hidden');
        }

function approveAppt(id) {
    Swal.fire({
        title: 'Approve Request?',
        text: "Confirm this appointment for surgery?",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#16a34a',
        confirmButtonText: 'Yes, Approve'
    }).then((result) => {
        if (result.isConfirmed) {
            // ACTUALLY SEND THE DATA TO PHP
            fetch('../../api/clinic/vet_approve_appt.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        title: 'Approved!',
                        text: 'The status has been updated to Confirmed.',
                        icon: 'success'
                    }).then(() => {
                        closeDetailsModal();
                        loadAppointments(); // This removes the row from the "Pending" list
                    });
                } else {
                    Swal.fire('Error', 'Could not update database: ' + data.error, 'error');
                }
            })
            .catch(err => {
                console.error('Error:', err);
                Swal.fire('Error', 'Connection failed.', 'error');
            });
        }
    });
}
    </script>
</body>
</html>
