<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment History - City Vet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        // Check session IMMEDIATELY before page loads
        fetch('../../api/auth/session_check.php')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    window.location.replace('../../login.html');
                } else {
                    // Safe UI Updater function
                    const updateHeaderName = () => {
                        const nameDisplay = document.getElementById('vet-name-display');
                        if (nameDisplay && data.user && data.user.name) {
                            // Automatically add "Dr." and remove the @gmail.com part if it's an email
                            let displayName = data.user.name.split('@')[0];
                            // Capitalize first letter
                            displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
                            nameDisplay.innerText = "Dr. " + displayName;
                        }
                    };

                    // Check if DOM is already loaded to prevent the race condition
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', updateHeaderName);
                    } else {
                        updateHeaderName();
                    }
                }
            })
            .catch(() => {
                window.location.replace('../../login.html');
            });
    </script>
    
    <script>
        // Check session IMMEDIATELY before page loads
        fetch('../../api/auth/session_check.php')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'error') {
                    // If the PHP bouncer says "Access Denied", kick them to login
                    window.location.replace('../../login.html');
                } else {
                    // Optional: If they are allowed, you can set the header name here!
                    document.addEventListener('DOMContentLoaded', () => {
                        const nameDisplay = document.getElementById('vet-name-display');
                        if (nameDisplay && data.user && data.user.name) {
                            nameDisplay.innerText = data.user.name;
                        }
                    });
                }
            })
            .catch(() => {
                // If the fetch fails entirely (e.g. server error), kick to login
                window.location.replace('../../login.html');
            });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden backdrop-blur-sm"></div>

    <div id="sidebar-container"></div>
    <script src="../../js/sidebar_vet.js"></script>

    <div class="flex-1 flex flex-col h-screen relative">
        <header class="bg-white h-16 flex items-center justify-between px-4 lg:px-8 shadow-sm z-10 border-b border-gray-100">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-[#00796B] text-xl focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-800">Appointment History</h2>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">
                    <i class="fa-solid fa-user-md"></i>
                </div>
                <span id="vet-name-display" class="hidden md:block text-sm font-medium text-gray-700">Dr. Veterinarian</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">History Log</h2>
                    <p class="text-gray-500 text-sm">Review past and upcoming confirmed appointments.</p>
                </div>
                <button class="bg-white border border-gray-200 hover:bg-gray-50 px-4 py-2 rounded-lg text-sm font-bold text-gray-700 shadow-sm transition" onclick="loadHistory()">
                    <i class="fas fa-sync-alt mr-2 text-blue-500"></i> Refresh List
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-[#2c5e9e] text-white">
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Appt ID</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Owner Name</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Pet</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Service</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Date & Time</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Status</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">Vet Assigned</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body" class="divide-y divide-gray-50 text-sm text-gray-700">
                            <tr><td colspan="7" class="px-6 py-10 text-center text-gray-400 font-medium">Loading history...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        fetch('../../api/auth/session_status.php')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'logged_out') window.location.href = '../login.html';
                else loadHistory();
            })
            .catch(() => loadHistory());

        function loadHistory() {
            fetch('../../api/clinic/appointments.php')
                .then(response => {
                    if (!response.ok) return response.json().then(err => { throw new Error(err.message); });
                    return response.json();
                })
                .then(data => {
                    const tbody = document.getElementById('history-table-body');
                    tbody.innerHTML = '';

                    if (data.status === 'error') {
                        Swal.fire('Database Error', data.message, 'error');
                        return;
                    }

                    if (data.length === 0) {
                        tbody.innerHTML = "<tr><td colspan='7' class='px-6 py-10 text-center text-gray-400 font-medium'>No history found.</td></tr>";
                        return;
                    }

                    data.forEach(row => {
                        let statusClass = 'bg-gray-50 text-gray-600';
                        if(row.Status === 'Pending') statusClass = 'bg-orange-50 text-orange-600';
                        if(row.Status === 'Confirmed') statusClass = 'bg-green-50 text-green-600';
                        if(row.Status === 'Cancelled') statusClass = 'bg-red-50 text-red-600';

                        const htmlRow = `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 font-bold text-gray-400">#${row.Appointment_ID}</td>
                                <td class="px-6 py-4 font-semibold text-gray-800">${row.Owner_First} ${row.Owner_Last}</td>
                                <td class="px-6 py-4">
                                    <div class="font-medium text-gray-800">${row.Pet_Name}</div>
                                    <div class="text-[11px] text-gray-500">${row.Species_Name}</div>
                                </td>
                                <td class="px-6 py-4 text-gray-600">${row.Service_Name}</td>
                                <td class="px-6 py-4">
                                    <div class="font-medium">${row.Formatted_Date}</div>
                                    <div class="text-[11px] text-gray-500">${row.Formatted_Time}</div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 rounded text-xs font-bold ${statusClass}">
                                        ${row.Status}
                                    </span>
                                </td>
                                <td class="px-6 py-4 font-medium text-gray-700">${row.Vet_First ? 'Dr. ' + row.Vet_First : '--'}</td>
                            </tr>
                        `;
                        tbody.innerHTML += htmlRow;
                    });
                })
                .catch(error => {
                    Swal.fire('Error', error.message, 'error');
                });
        }

        function logout() {
            Swal.fire({
                title: 'Log Out?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Yes',
                confirmButtonColor: '#2c5e9e'
            }).then((result) => {
                if(result.isConfirmed) window.location.href = '../../login.html';
            });
        }
    </script>
</body>
</html>
