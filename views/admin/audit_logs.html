<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - City Vet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <div id="sidebar-container"></div>
    <script src="../../js/sidebar.js"></script>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="bg-white h-16 flex items-center justify-between px-8 shadow-sm z-10 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-teal-50 text-[#00796B] rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-clock-rotate-left text-sm"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">System Audit Logs</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="fetchLogs()" class="bg-white border border-gray-200 hover:bg-gray-50 px-4 py-2 rounded-xl text-xs font-bold text-gray-600 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh Logs
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 bg-[#fbfcfd]">
            <div class="max-w-6xl mx-auto">
                <div class="mb-8">
                    <h3 class="text-2xl font-black text-gray-800 tracking-tight">Database Activity</h3>
                    <p class="text-sm text-gray-500">Real-time monitoring of table modifications and user actions.</p>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50 text-[10px] uppercase text-gray-400 font-black border-b border-gray-100">
                                <tr>
                                    <th class="px-6 py-5">Time & Date</th>
                                    <th class="px-6 py-5">Actor</th>
                                    <th class="px-6 py-5">Event Action</th>
                                    <th class="px-6 py-5 text-center">Entity Affected</th>
                                    <th class="px-6 py-5 text-right">Record ID</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody" class="divide-y divide-gray-50 text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const res = await fetch('../../api/system/get_logs.php');
                const data = await res.json();
                
                const tbody = document.getElementById('logTableBody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="py-20 text-center text-gray-400 italic">No activity logs found in database.</td></tr>';
                    return;
                }

                data.forEach(log => {
                    const row = `
                        <tr class="hover:bg-teal-50/30 transition-colors">
                            <td class="px-6 py-4 font-medium text-gray-400 text-xs whitespace-nowrap">
                                ${new Date(log.Timestamp).toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-gray-900 font-bold uppercase text-[11px]">@${log.Username}</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="font-semibold text-gray-700">${log.Action}</span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span class="bg-gray-100 text-gray-500 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter border border-gray-200">
                                    ${log.Table_Affected}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <span class="font-mono text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded">#${log.Record_ID}</span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) { 
                console.error("Log error:", err); 
            }
        }

        document.addEventListener('DOMContentLoaded', fetchLogs);
    </script>
</body>
</html>
