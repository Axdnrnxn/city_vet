<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Records - City Vet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

    <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden glass"></div>

<div id="sidebar-container"></div>

<script src="../../js/sidebar.js"></script>

    <div class="flex-1 flex flex-col h-screen relative">
        <header class="bg-white h-16 flex items-center justify-between px-4 lg:px-8 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-[#00796B] text-xl focus:outline-none"><i class="fa-solid fa-bars"></i></button>
                <h2 class="text-xl font-bold text-gray-800">Employee Records</h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer p-2 rounded-full hover:bg-gray-100"><i class="fa-regular fa-bell text-gray-600 text-lg"></i></div>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#00796B] text-white rounded-full flex items-center justify-center text-sm font-bold">A</div>
                    <span class="hidden md:block text-sm font-medium text-gray-700">Administrator</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <div class="relative w-full md:w-96">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search staff..." class="w-full py-2.5 pl-10 pr-4 border border-gray-300 rounded-xl focus:outline-none focus:border-[#00796B] focus:ring-1 focus:ring-[#00796B] shadow-sm">
                </div>
                <button onclick="openAddModal()" class="w-full md:w-auto bg-[#00796B] hover:bg-[#004D40] text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-plus"></i> Add New Employee
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-gray-50 text-xs text-gray-500 uppercase border-b border-gray-200">
                                <th class="px-6 py-4 font-bold">Employee Name</th>
                                <th class="px-6 py-4 font-bold">Role & Position</th>
                                <th class="px-6 py-4 font-bold">Contact Info</th>
                                <th class="px-6 py-4 font-bold text-center">Status</th>
                                <th class="px-6 py-4 font-bold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staffTable" class="text-sm text-gray-700 divide-y divide-gray-100">
                            <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Loading staff...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="addModal" class="fixed inset-0 z-50 hidden bg-black bg-opacity-60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all scale-95 opacity-0" id="modalContent">
            
            <div class="bg-[#00796B] px-6 py-4 flex justify-between items-center text-white shadow-md">
                <h3 class="font-bold text-lg tracking-wide">Register New Employee</h3>
                <button onclick="closeModal()" class="bg-white/10 hover:bg-white/20 rounded-full w-8 h-8 flex items-center justify-center transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="p-6 max-h-[80vh] overflow-y-auto">
                <form id="addStaffForm" class="space-y-5">
                    
                    <div>
                        <h4 class="text-xs font-bold text-gray-400 uppercase mb-3 border-b pb-1">Personal Information</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">First Name</label>
                                <input type="text" id="fname" required class="w-full border border-gray-300 px-3 py-2.5 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition bg-gray-50 focus:bg-white">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Last Name</label>
                                <input type="text" id="lname" required class="w-full border border-gray-300 px-3 py-2.5 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition bg-gray-50 focus:bg-white">
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-xs font-bold text-gray-400 uppercase mb-3 border-b pb-1">Role Assignment</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">System Role</label>
                                <div class="relative">
                                    <select id="role_id" class="w-full border border-gray-300 px-3 py-2.5 rounded-lg appearance-none bg-gray-50 focus:bg-white focus:ring-2 focus:ring-teal-500 outline-none cursor-pointer">
                                        <option value="" disabled selected>Select Access Level</option>
                                        <option value="4">Staff (Front Desk)</option>
                                        <option value="2">Veterinarian</option>
                                        <option value="1">Administrator</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                        <i class="fa-solid fa-chevron-down text-xs"></i>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Job Title</label>
                                <input type="text" id="position" placeholder="e.g. Head Vet" required class="w-full border border-gray-300 px-3 py-2.5 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition bg-gray-50 focus:bg-white">
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Phone Number</label>
                            <input type="tel" id="phone" placeholder="09xxxxxxxxx" required class="w-full border border-gray-300 px-3 py-2.5 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition bg-gray-50 focus:bg-white">
                        </div>
                    </div>

                    <div class="bg-teal-50 p-4 rounded-xl border border-teal-100">
                        <h4 class="text-xs font-bold text-teal-700 uppercase mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-lock"></i> Account Credentials
                        </h4>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Email Address</label>
                                <input type="email" id="email" required class="w-full border border-gray-300 px-3 py-2.5 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition bg-white">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Password</label>
                                <input type="password" id="password" required class="w-full border border-gray-300 px-3 py-2.5 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none transition bg-white">
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="p-6 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2.5 text-gray-600 font-bold hover:bg-gray-200 rounded-lg transition text-sm">Cancel</button>
                <button onclick="submitStaff()" class="px-6 py-2.5 bg-[#00796B] text-white font-bold rounded-lg hover:bg-[#004D40] shadow-md transition text-sm flex items-center gap-2">
                    <i class="fa-solid fa-check"></i> Create Account
                </button>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');
        const modal = document.getElementById('addModal');
        const modalContent = document.getElementById('modalContent');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        async function checkSession() {
            try {
                const res = await fetch('../../api/auth/session_status.php');
                const data = await res.json();
                if (data.status !== 'logged_in' || data.role_id != 1) window.location.href = '../../login.html';
            } catch (e) { window.location.href = '../../login.html'; }
        }
        checkSession();

        async function loadStaff() {
            try {
                const res = await fetch('../../api/records/staff.php');
                const data = await res.json();
                const tbody = document.getElementById('staffTable');
                tbody.innerHTML = '';
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">No staff found.</td></tr>';
                    return;
                }
                data.forEach(s => {
                    let statusColor = s.Status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';
                    let roleBadge = s.Role_name === 'Administrator' ? 'bg-purple-100 text-purple-700' : (s.Role_name === 'Veterinarian' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700');
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center font-bold text-gray-600 text-sm">${s.First_name.charAt(0)}${s.Last_name.charAt(0)}</div>
                                    <div><p class="font-bold text-gray-800">${s.First_name} ${s.Last_name}</p><p class="text-xs text-gray-400">ID: #${String(s.Staff_ID).padStart(3,'0')}</p></div>
                                </div>
                            </td>
                            <td class="px-6 py-4"><p class="text-gray-700 font-medium">${s.Position}</p><span class="${roleBadge} px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide">${s.Role_name}</span></td>
                            <td class="px-6 py-4"><p class="text-gray-600 text-sm"><i class="fa-solid fa-envelope text-gray-300 mr-1"></i> ${s.Email}</p><p class="text-gray-400 text-xs mt-0.5">${s.Phone_number}</p></td>
                            <td class="px-6 py-4 text-center"><span class="${statusColor} px-3 py-1 rounded-full text-xs font-bold capitalize">${s.Status}</span></td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="toggleStatus(${s.Staff_ID}, '${s.Status}')" class="text-gray-400 hover:text-red-500 transition" title="Toggle Status"><i class="fa-solid fa-power-off"></i></button>
                            </td>
                        </tr>`;
                });
            } catch(e) { console.error(e); }
        }

        function openAddModal() {
            modal.classList.remove('hidden');
            setTimeout(() => { modalContent.classList.remove('scale-95', 'opacity-0'); modalContent.classList.add('scale-100', 'opacity-100'); }, 10);
        }

        function closeModal() {
            modalContent.classList.remove('scale-100', 'opacity-100'); modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); document.getElementById('addStaffForm').reset(); }, 300);
        }

        async function submitStaff() {
            const data = {
                action: 'create',
                fname: document.getElementById('fname').value,
                lname: document.getElementById('lname').value,
                role_id: document.getElementById('role_id').value,
                position: document.getElementById('position').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            if(!data.email || !data.password || !data.fname || !data.role_id) { Swal.fire('Error', 'Please fill all fields', 'warning'); return; }
            const res = await fetch('../../api/records/staff.php', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const result = await res.json();
            if(result.status === 'success') { Swal.fire({icon: 'success', title: 'Added!', timer: 1500, showConfirmButton: false}); closeModal(); loadStaff(); } 
            else { Swal.fire('Error', result.message, 'error'); }
        }

        async function toggleStatus(id, currentStatus) {
            const action = currentStatus === 'active' ? 'Deactivate' : 'Activate';
            Swal.fire({ title: `${action} Employee?`, text: "Confirm status change.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Yes' })
            .then(async (r) => { if(r.isConfirmed) { await fetch('../../api/records/staff.php', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'toggle_status', staff_id: id, current_status: currentStatus }) }); loadStaff(); }});
        }

        function logout() { Swal.fire({ title: 'Logout?', text: "End session?", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Yes' }).then((r) => { if(r.isConfirmed) window.location.href = '../../api/auth/logout.php'; }); }
        
        loadStaff();
    </script>
</body>
</html>
