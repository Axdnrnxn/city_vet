<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Owner Records - City Vet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden glass"></div>

<div id="sidebar-container"></div>

<script src="../../js/sidebar.js"></script>

    <div class="flex-1 flex flex-col h-screen relative">
        
        <header class="bg-white h-16 flex items-center justify-between px-4 lg:px-8 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-[#00796B] text-xl focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-800">Pet Owner Records</h2>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer p-2 rounded-full hover:bg-gray-100">
                    <i class="fa-regular fa-bell text-gray-600 text-lg"></i>
                    <span class="absolute top-1 right-1 bg-red-500 w-2.5 h-2.5 rounded-full border-2 border-white"></span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#00796B] text-white rounded-full flex items-center justify-center text-sm font-bold">A</div>
                    <span class="hidden md:block text-sm font-medium text-gray-700">Administrator</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                
                <div class="relative w-full md:w-96">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search owner name, address..." class="w-full py-2.5 pl-10 pr-4 border border-gray-300 rounded-xl focus:outline-none focus:border-[#00796B] focus:ring-1 focus:ring-[#00796B] shadow-sm">
                </div>

                <button onclick="openAddModal()" class="w-full md:w-auto bg-[#00796B] hover:bg-[#004D40] text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> Add New Owner
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-gray-50 text-xs text-gray-500 uppercase border-b border-gray-200">
                                <th class="px-6 py-4 font-bold">Owner Name</th>
                                <th class="px-6 py-4 font-bold">Contact Info</th>
                                <th class="px-6 py-4 font-bold">Address</th>
                                <th class="px-6 py-4 font-bold text-center">Registered Pets</th>
                                <th class="px-6 py-4 font-bold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ownersTable" class="text-sm text-gray-700 divide-y divide-gray-100">
                            <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Loading records...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="px-6 py-4 border-t border-gray-100 flex justify-between items-center text-xs text-gray-500 bg-gray-50">
                    <span id="recordCount">Showing 0 records</span>
                    <div class="flex gap-2">
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-white transition">Prev</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-white transition">Next</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="addOwnerModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50 transition-opacity" onclick="closeAddModal()"></div>
        
        <div class="absolute inset-y-0 right-0 max-w-full flex">
            <div class="w-screen max-w-md bg-white shadow-2xl transform transition-transform translate-x-full" id="modalPanel">
                <div class="h-full flex flex-col bg-white">
                    
                    <div class="px-6 py-4 bg-[#00796B] text-white flex justify-between items-center shadow-md">
                        <h2 class="text-lg font-bold">Register Walk-in Client</h2>
                        <button onclick="closeAddModal()" class="text-white hover:text-gray-200 focus:outline-none">
                            <i class="fa-solid fa-xmark text-xl"></i>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 space-y-6">
                        <p class="text-sm text-gray-500 italic">Enter the client's details to create their account and profile instantly.</p>
                        
                        <form id="addOwnerForm" class="space-y-4">
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">First Name</label>
                                    <input type="text" id="fname" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Last Name</label>
                                    <input type="text" id="lname" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">House Address / Street</label>
                                <input type="text" id="address" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Barangay</label>
                                <select id="barangay" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none bg-white">
                                    <option value="" disabled selected>Select Barangay</option>
                                    <option value="Carmen">Carmen</option>
                                    <option value="Kauswagan">Kauswagan</option>
                                    <option value="Nazareth">Nazareth</option>
                                    <option value="Poblacion">Poblacion</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="border-t border-gray-200 pt-4 mt-2">
                                <h3 class="text-sm font-bold text-[#00796B] mb-3 uppercase">Account Credentials</h3>
                                
                                <div>
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Phone Number</label>
                                    <input type="tel" id="phone" pattern="[0-9]{11}" placeholder="09xxxxxxxxx" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                                </div>

                                <div class="mt-3">
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Email Address</label>
                                    <input type="email" id="email" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                                </div>
                                
                                <div class="mt-3">
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Password</label>
                                    <input type="password" id="password" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                                </div>

                                <div class="mt-3">
                                    <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Confirm Password</label>
                                    <input type="password" id="confirm_password" required class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal-500 outline-none">
                                </div>

                                <div class="flex items-center mt-2">
                                    <input type="checkbox" id="showPass" onclick="toggleModalPassword()" class="w-4 h-4 text-teal-600 rounded cursor-pointer">
                                    <label for="showPass" class="ml-2 text-xs text-gray-600 cursor-pointer">Show Password</label>
                                </div>
                            </div>

                        </form>
                    </div>

                    <div class="p-6 border-t border-gray-200 bg-gray-50">
                        <button onclick="submitNewOwner()" class="w-full bg-[#00796B] hover:bg-[#004D40] text-white font-bold py-3 rounded shadow transition uppercase tracking-wide">
                            Create Account
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        function toggleSidebar() {
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // 2. Auth Check
        async function checkSession() {
            try {
                const res = await fetch('../../api/auth/session_status.php');
                const data = await res.json();
                if (data.status !== 'logged_in' || data.role_id != 1) {
                    window.location.href = '../../login.html';
                }
            } catch (error) {
                window.location.href = '../../login.html';
            }
        }
        checkSession();

        // 3. Logout
        function logout() {
            Swal.fire({
                title: 'Logout?',
                text: "End your session?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Yes, Logout'
            }).then((result) => {
                if (result.isConfirmed) window.location.href = '../../api/auth/logout.php';
            });
        }

        // 4. Load Data
        async function loadOwners() {
            try {
                const res = await fetch('../../api/records/owners.php');
                const data = await res.json();
                const tbody = document.getElementById('ownersTable');
                
                tbody.innerHTML = '';
                document.getElementById('recordCount').innerText = `Showing ${data.length} records`;

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">No records found.</td></tr>';
                    return;
                }

                data.forEach(owner => {
                    let petBadge = owner.Pet_Count > 0 ? 'bg-teal-50 text-teal-700 border border-teal-100' : 'bg-gray-100 text-gray-600';
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition group">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-9 h-9 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center font-bold text-sm">
                                        ${owner.First_name.charAt(0)}${owner.Last_name.charAt(0)}
                                    </div>
                                    <div>
                                        <p class="font-bold text-gray-800">${owner.First_name} ${owner.Last_name}</p>
                                        <p class="text-xs text-gray-400">ID: #${owner.Owner_ID}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <p class="text-gray-600 font-medium">${owner.Contact_Number}</p>
                                <p class="text-gray-400 text-xs">${owner.Email}</p>
                            </td>
                            <td class="px-6 py-4 text-gray-600">${owner.Address}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="${petBadge} font-bold px-3 py-1 rounded-full text-xs">
                                    ${owner.Pet_Count} Pets
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <button onclick="viewProfile(${owner.Owner_ID})" class="text-blue-600 hover:text-white border border-blue-200 hover:bg-blue-600 font-medium text-xs px-3 py-1.5 rounded-lg transition">View Details</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        // 5. MODAL FUNCTIONS
        const modal = document.getElementById('addOwnerModal');
        const modalPanel = document.getElementById('modalPanel');

        function openAddModal() {
            modal.classList.remove('hidden');
            // Small delay for transition
            setTimeout(() => {
                modalPanel.classList.remove('translate-x-full');
            }, 10);
        }

        function closeAddModal() {
            modalPanel.classList.add('translate-x-full');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('addOwnerForm').reset(); // Clear form
            }, 300);
        }

        function toggleModalPassword() {
            var p = document.getElementById("password");
            var cp = document.getElementById("confirm_password");
            if (p.type === "password") { p.type = "text"; cp.type = "text"; } else { p.type = "password"; cp.type = "password"; }
        }

        async function submitNewOwner() {
            // Get Values
            const data = {
                fname: document.getElementById('fname').value,
                lname: document.getElementById('lname').value,
                address: document.getElementById('address').value,
                barangay: document.getElementById('barangay').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirm_password: document.getElementById('confirm_password').value
            };

            // Simple Validation
            if(!data.fname || !data.lname || !data.email || !data.password) {
                Swal.fire('Error', 'Please fill in all required fields.', 'warning');
                return;
            }

            if(data.password !== data.confirm_password) {
                Swal.fire('Error', 'Passwords do not match.', 'error');
                return;
            }

            // Send to Backend (Using existing register.php logic)
            try {
                const res = await fetch('../../api/auth/register.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if(result.status === 'success') {
                    Swal.fire({icon: 'success', title: 'Success', text: 'Owner registered successfully!', timer: 1500, showConfirmButton: false});
                    closeAddModal();
                    loadOwners(); // Refresh table
                } else {
                    Swal.fire({icon: 'error', title: 'Error', text: result.message});
                }
            } catch (err) {
                Swal.fire({icon: 'error', title: 'System Error', text: 'Connection failed.'});
            }
        }

        // 6. Search & Filter
        function filterTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#ownersTable tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? '' : 'none';
            });
        }

        function viewProfile(id) {
            window.location.href = `owner_profile.html?id=${id}`;
        }

        // Init
        loadOwners();
    </script>
</body>
</html>
