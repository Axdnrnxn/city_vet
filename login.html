<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Vet - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-white h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">
        <div class="bg-[#0e7490] p-8 md:p-10 rounded-2xl md:rounded-3xl shadow-2xl text-center border border-teal-600">
            
            <h2 class="text-white text-2xl font-bold italic mb-8 tracking-wider">LOG IN FORM</h2>
            
            <form id="loginForm" class="space-y-6">
                
                <div class="text-left">
                    <label class="block text-white text-xs font-bold uppercase mb-1 ml-1">Email</label>
                    <input type="email" id="email" required class="w-full p-3 rounded bg-gray-100 border-none focus:ring-2 focus:ring-teal-300 outline-none text-gray-800">
                </div>

                <div class="text-left">
                    <label class="block text-white text-xs font-bold uppercase mb-1 ml-1">Password</label>
                    <input type="password" id="password" required class="w-full p-3 rounded bg-gray-100 border-none focus:ring-2 focus:ring-teal-300 outline-none text-gray-800">
                </div>

                <div class="flex items-center ml-1 py-1">
                    <input type="checkbox" id="showPass" onclick="toggleLoginPass()" class="w-5 h-5 text-teal-600 rounded cursor-pointer">
                    <label for="showPass" class="ml-2 text-white text-sm cursor-pointer select-none">Show Password</label>
                </div>

                <div class="text-center mt-4">
                    <p class="text-white text-xs italic mb-2">
                        DON'T HAVE AN ACCOUNT YET?
                    </p>
                    <a href="register.html" class="text-blue-200 font-bold hover:underline uppercase text-sm">Create an Account</a>
                </div>

                <div>
                    <button type="submit" class="w-full bg-white text-[#0e7490] font-extrabold py-3 rounded shadow hover:bg-gray-200 transition duration-200 uppercase text-sm tracking-wider">
                        Log In
                    </button>
                </div>

            </form>
        </div>
    </div>

    <script>
        function toggleLoginPass() {
            var x = document.getElementById("password");
            if (x.type === "password") { x.type = "text"; } else { x.type = "password"; }
        }

        // (The JS Logic remains the same)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('api/auth/login.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: email, password: password})
                });
                const result = await res.json();

                if (result.status === 'success') {
                    Swal.fire({icon: 'success', title: 'Welcome!', text: 'Logging in...', timer: 1000, showConfirmButton: false})
                    .then(() => window.location.href = result.redirect);
                } else {
                    Swal.fire({icon: 'error', title: 'Login Failed', text: result.message});
                }
            } catch (err) {
                Swal.fire({icon: 'error', title: 'Error', text: 'Server connection failed.'});
            }
        });
    </script>
</body>
</html>
